<!DOCTYPE html>
<html>
<head>
<title>Daily Affirmations - MindCare</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f3f6ff;
margin:0;
padding:40px;
}

/* TITLE */

h1{
margin-bottom:25px;
color:#1e293b;
}

/* INPUT */

.add-box{
display:flex;
gap:10px;
margin-bottom:25px;
}

.add-box input{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #cbd5e1;
}

.add-box button{
padding:12px 18px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* GRID */

.board{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

/* CARD */

.card{
position:relative;
padding:25px;
border-radius:14px;
color:white;
font-size:16px;
font-weight:500;
box-shadow:0 8px 18px rgba(0,0,0,.08);
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

/* COLORS */

.c1{background:#6366f1;}
.c2{background:#f43f5e;}
.c3{background:#10b981;}
.c4{background:#f59e0b;}
.c5{background:#8b5cf6;}
.c6{background:#8a375a}

/* DELETE BUTTON */

.delete{
position:absolute;
top:10px;
right:12px;
cursor:pointer;
font-size:18px;
}

/* BACK BUTTON */

.back{
display:inline-block;
margin-top:35px;
padding:10px 20px;
background:#4f46e5;
color:white;
border-radius:8px;
text-decoration:none;
}

</style>
</head>

<body>

<h1>✨ Daily Affirmations</h1>

<!-- ADD AFFIRMATION (UPDATED TO FORM) -->

<form method="POST">
<div class="add-box">
<input 
    type="text" 
    name="affirmation" 
    placeholder="Write your affirmation..." 
    required
>
<button type="submit">Add</button>
</div>
</form>

<!-- BOARD -->

<div class="board" id="board">

<!-- DEFAULT AFFIRMATIONS -->

<div class="card c1">I am worthy of love and happiness.</div>
<div class="card c2">I am strong and capable.</div>
<div class="card c3">Today is full of possibilities.</div>
<div class="card c4">I choose peace over worry.</div>
<div class="card c5">I am grateful for this moment.</div>
<div class="card c6">I can do it.</div>

<!-- USER CUSTOM AFFIRMATIONS -->

{% for a in user_affirmations %}

<div class="card c4">

    {{ a[1] }}

    <a 
        href="/delete_affirmation/{{ a[0] }}" 
        class="delete"
        style="color:white; text-decoration:none;"
    >
        ×
    </a>

</div>

{% endfor %}

</div>

<a href="/dashboard" class="back">← Back to Dashboard</a>

</body>
</html>
